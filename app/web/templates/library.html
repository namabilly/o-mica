{% extends "base.html" %}
{% block content %}
<h1>📚 Library</h1>
<p class="muted">Saved specialist outputs, handoffs, and accepted deliverables.</p>

<style>
  /* Radios precede #lib-wrap; panes live inside it. ~ reaches them. */
  .lib-pane{display:none}
  #lib_out:checked   ~ #lib-wrap .pane-out{display:block}
  #lib_hand:checked  ~ #lib-wrap .pane-hand{display:block}
  #lib_deliv:checked ~ #lib-wrap .pane-deliv{display:block}
  #lib_out:checked   ~ .lib-tabs label[for=lib_out],
  #lib_hand:checked  ~ .lib-tabs label[for=lib_hand],
  #lib_deliv:checked ~ .lib-tabs label[for=lib_deliv]{
    background:#fff;color:var(--primary-d);box-shadow:var(--shadow-sm);
  }
</style>

<input class="libtab-radio" type="radio" id="lib_out" name="libtab" checked>
<input class="libtab-radio" type="radio" id="lib_hand" name="libtab">
<input class="libtab-radio" type="radio" id="lib_deliv" name="libtab">

<div style="display:flex;align-items:center;gap:12px;margin:14px 0;flex-wrap:wrap">
  <div class="seg lib-tabs">
    <label for="lib_out">Outputs</label>
    <label for="lib_hand">Handoffs</label>
    <label for="lib_deliv">Deliverables</label>
  </div>

  <form style="display:flex;gap:8px;flex-wrap:wrap;margin-left:auto"
        hx-get="/library/lists" hx-target="#lib-wrap" hx-swap="innerHTML"
        hx-trigger="change, search, keyup delay:300ms from:input[name=q]">
    <input type="search" name="q" placeholder="🔍 search"
           style="border:1.5px solid var(--line);border-radius:12px;padding:7px 11px;background:var(--bg-soft);min-width:140px">
    <select name="specialist" class="fsel">
      <option value="all">specialist: all</option>
      {% for s in specialists %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
    </select>
    <select name="domain" class="fsel">
      <option value="all">domain: all</option>
      {% for d in domains %}<option value="{{ d }}">{{ d }}</option>{% endfor %}
    </select>
    <select name="sort" class="fsel">
      <option value="new">newest first</option>
      <option value="old">oldest first</option>
    </select>
  </form>
</div>

<div id="lib-wrap">
  {% include "_library_lists.html" %}
</div>
{% endblock %}
